name: Nightly

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  APP_ID: app.diskette.Diskette
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            appstream \
            desktop-file-utils \
            libadwaita-1-dev \
            libgtk-4-dev \
            librsvg2-bin \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Validate desktop metadata
        run: |
          desktop-file-validate "data/${APP_ID}.desktop"
          appstreamcli validate --no-net "data/${APP_ID}.metainfo.xml"
          rsvg-convert -w 128 -h 128 "data/icons/${APP_ID}.svg" -o "/tmp/${APP_ID}.png"

  deb:
    name: Build DEB
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libadwaita-1-dev \
            libgtk-4-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb --version 2.6.1 --locked

      - name: Build DEB package
        run: |
          cargo build --release
          cargo deb --no-build
          mkdir -p dist/deb
          cp target/debian/*.deb dist/deb/

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: diskette-nightly-deb-${{ github.sha }}
          path: dist/deb/*.deb
          if-no-files-found: error
          retention-days: 14

  rpm:
    name: Build RPM
    runs-on: ubuntu-latest
    needs: check
    container:
      image: registry.fedoraproject.org/fedora-toolbox:43

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          dnf -y install \
            cargo \
            gcc \
            gtk4-devel \
            libadwaita-devel \
            pkgconf-pkg-config \
            rpm-build \
            rust

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm --locked --root /usr/local

      - name: Build RPM package
        run: |
          cargo build --release
          cargo generate-rpm
          mkdir -p dist/rpm
          cp target/generate-rpm/*.rpm dist/rpm/

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: diskette-nightly-rpm-${{ github.sha }}
          path: dist/rpm/*.rpm
          if-no-files-found: error
          retention-days: 14

  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            flatpak \
            flatpak-builder

      - name: Add Flathub remote
        run: |
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak bundle
        run: |
          mkdir -p dist/flatpak
          flatpak-builder \
            --force-clean \
            --user \
            --install-deps-from=flathub \
            --repo=dist/flatpak/repo \
            flatpak-build-dir \
            "flatpak/${APP_ID}.yml"
          flatpak build-bundle \
            dist/flatpak/repo \
            "dist/flatpak/${APP_ID}-nightly-${GITHUB_SHA}.flatpak" \
            "${APP_ID}"

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: diskette-nightly-flatpak-${{ github.sha }}
          path: dist/flatpak/*.flatpak
          if-no-files-found: error
          retention-days: 14
